name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      - name: Build HTML from cached/seed data (no network fetch)
        run: node scripts/build-html.js
      - name: Verify output was produced
        run: test -s output/index.html
